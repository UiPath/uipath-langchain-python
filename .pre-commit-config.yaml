repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.0
  hooks:
    - id: ruff
      args: [ --fix ]
    - id: ruff-format
- repo: local
  hooks:
    - id: gen-guardrail-enums
      name: Regenerate guardrail enum tables from code
      language: python
      entry: python scripts/gen_guardrail_enums.py
      files: ^(docs/guardrails\.md|src/uipath_langchain/guardrails/enums\.py)$
      pass_filenames: false
