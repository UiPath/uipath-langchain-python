[project]
name = "uipath-lowcode-python"
version = "0.0.1"
description = "UiPath LowCode"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.6.6",
    "uipath>=2.1.78",
    "uipath-langchain>=0.0.138",
]
maintainers = [
    { name = "Silviu Georgescu", email = "silviu.georgescu@uipath.com" },
    { name = "Cristian Cotovanu", email = "cristian.cotovanu@uipath.com" },
]

[project.entry-points."uipath.middlewares"]
register = "uipath_lowcode.middlewares:register_middleware"

[project.urls]
Homepage = "https://uipath.com"
Repository = "https://github.com/UiPath/uipath-lowcode-python"
Documentation = "http://todo" # TODO: add documentation

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "mypy>=1.14.1",
    "ruff>=0.9.4",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.11.1",
    "pytest-asyncio>=1.0.0",
    "pytest_httpx>=0.35.0",
    "pre-commit>=4.1.0",
    "datamodel-code-generator>=0.33.0",
    "requests>=2.32.5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/uipath_lowcode"]

[tool.ruff]
line-length = 88
indent-width = 4
exclude = ["samples/**", "testcases/**"]

[tool.ruff.lint]
select = ["E", "F", "B", "I"]

[tool.ruff.lint.per-file-ignores]
"*" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
plugins = [
  "pydantic.mypy"
]

exclude = [
    "samples/.*",
    "testcases/.*"
]

follow_imports = "silent"
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_reexport = true

disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = "-ra -q"
asyncio_default_fixture_loop_scope = "function"
asyncio_mode = "auto"

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true
