sonar.projectKey=UiPath_uipath-langchain-python
sonar.organization=ui
sonar.host.url=https://sonarcloud.io

sonar.sources=src/uipath_langchain
sonar.tests=tests

sonar.python.version=3.11,3.12,3.13
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/samples/**,**/testcases/**,**/template/**

# The Data Fabric ontology tool is an intentionally self-contained duplicate of
# the entity tool's sub-graph/prompt rendering, kept separate so the entity path
# (datafabric_subgraph.py / datafabric_tool.py) stays byte-identical to upstream.
# Exclude it from copy-paste detection so that deliberate isolation isn't flagged.
sonar.cpd.exclusions=**/datafabric_tool/ontology/**

sonar.sourceEncoding=UTF-8
