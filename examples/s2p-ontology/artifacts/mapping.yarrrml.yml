prefixes:
  ont: https://ontology.uipath.com/ont#
mappings:
  Supplier:
    sources:
      - access: datafabric
        table: Supplier
        entityId: a4a5f7d7-b377-49c2-9166-cc0b749b60e6
        folderId: 99267945-982c-4bf6-ae19-ab8764ad8720
        referenceFormulation: rr:SQL2008
    s: ont:Supplier/$(supplierId)
    po:
      - - a
        - ont:Supplier
      - - ont:Supplier.supplierId
        - $(supplierId)
      - - ont:Supplier.name
        - $(name)
      - - ont:Supplier.status
        - $(status)
      - - ont:Supplier.country
        - $(country)
      - - ont:Supplier.preferredFlag
        - $(preferredFlag)
  Invoice:
    sources:
      - access: datafabric
        table: Invoice
        entityId: b2b6d32c-0872-4f8f-9406-70d26720a033
        folderId: 99267945-982c-4bf6-ae19-ab8764ad8720
        referenceFormulation: rr:SQL2008
    s: ont:Invoice/$(invoiceId)
    po:
      - - a
        - ont:Invoice
      - - ont:Invoice.invoiceId
        - $(invoiceId)
      - - ont:Invoice.invoiceDate
        - $(invoiceDate)
      - - ont:Invoice.amount
        - $(amount)
      - - ont:Invoice.currency
        - $(currency)
      - - ont:Invoice.status
        - $(status)
      - - ont:Invoice.supplierId
        - $(supplierId)
      - - ont:Invoice.poId
        - $(poId)
      - p: ont:invoice_paidTo
        o:
          mapping: Supplier
          condition:
            function: equal
            parameters:
              - - str1
                - $(supplierId)
              - - str2
                - $(supplierId)
      - p: ont:invoice_referencesPO
        o:
          mapping: PurchaseOrder
          condition:
            function: equal
            parameters:
              - - str1
                - $(poId)
              - - str2
                - $(poId)
  PurchaseOrder:
    sources:
      - access: datafabric
        table: PurchaseOrder
        entityId: ecd797df-226e-4f19-a048-84d621efec7b
        folderId: 99267945-982c-4bf6-ae19-ab8764ad8720
        referenceFormulation: rr:SQL2008
    s: ont:PurchaseOrder/$(poId)
    po:
      - - a
        - ont:PurchaseOrder
      - - ont:PurchaseOrder.poId
        - $(poId)
      - - ont:PurchaseOrder.amount
        - $(amount)
      - - ont:PurchaseOrder.currency
        - $(currency)
      - - ont:PurchaseOrder.status
        - $(status)
      - - ont:PurchaseOrder.supplierId
        - $(supplierId)
      - - ont:PurchaseOrder.orderDate
        - $(orderDate)
      - p: ont:po_orderedFrom
        o:
          mapping: Supplier
          condition:
            function: equal
            parameters:
              - - str1
                - $(supplierId)
              - - str2
                - $(supplierId)
  Commodity:
    sources:
      - access: datafabric
        table: Commodity
        entityId: b6b7592d-714d-4f8c-b112-3c9755c9d4f6
        folderId: 99267945-982c-4bf6-ae19-ab8764ad8720
        referenceFormulation: rr:SQL2008
    s: ont:Commodity/$(commodityId)
    po:
      - - a
        - ont:Commodity
      - - ont:Commodity.commodityId
        - $(commodityId)
      - - ont:Commodity.code
        - $(code)
      - - ont:Commodity.name
        - $(name)
      - - ont:Commodity.level
        - $(level)
  SpendRecord:
    sources:
      - access: datafabric
        table: SpendRecord
        entityId: 4da9200a-46b9-47c0-8066-2b9fc38a737f
        folderId: 99267945-982c-4bf6-ae19-ab8764ad8720
        referenceFormulation: rr:SQL2008
    s: ont:SpendRecord/$(spendId)
    po:
      - - a
        - ont:SpendRecord
      - - ont:SpendRecord.spendId
        - $(spendId)
      - - ont:SpendRecord.invoiceId
        - $(invoiceId)
      - - ont:SpendRecord.supplierId
        - $(supplierId)
      - - ont:SpendRecord.commodityId
        - $(commodityId)
      - - ont:SpendRecord.rateId
        - $(rateId)
      - - ont:SpendRecord.originalAmount
        - $(originalAmount)
      - - ont:SpendRecord.originalCurrency
        - $(originalCurrency)
      - - ont:SpendRecord.normalizedAmount
        - $(normalizedAmount)
      - - ont:SpendRecord.period
        - $(period)
      - - ont:SpendRecord.onContract
        - $(onContract)
      - p: ont:spend_fromInvoice
        o:
          mapping: Invoice
          condition:
            function: equal
            parameters:
              - - str1
                - $(invoiceId)
              - - str2
                - $(invoiceId)
      - p: ont:spend_withSupplier
        o:
          mapping: Supplier
          condition:
            function: equal
            parameters:
              - - str1
                - $(supplierId)
              - - str2
                - $(supplierId)
      - p: ont:spend_forCommodity
        o:
          mapping: Commodity
          condition:
            function: equal
            parameters:
              - - str1
                - $(commodityId)
              - - str2
                - $(commodityId)
      - p: ont:spend_convertedWith
        o:
          mapping: FXRate
          condition:
            function: equal
            parameters:
              - - str1
                - $(rateId)
              - - str2
                - $(rateId)
  FXRate:
    sources:
      - access: datafabric
        table: FXRate
        entityId: 48888528-afff-43f6-baa8-f454a77658cd
        folderId: 99267945-982c-4bf6-ae19-ab8764ad8720
        referenceFormulation: rr:SQL2008
    s: ont:FXRate/$(rateId)
    po:
      - - a
        - ont:FXRate
      - - ont:FXRate.rateId
        - $(rateId)
      - - ont:FXRate.fromCurrency
        - $(fromCurrency)
      - - ont:FXRate.toCurrency
        - $(toCurrency)
      - - ont:FXRate.rate
        - $(rate)
      - - ont:FXRate.effectiveDate
        - $(effectiveDate)
  ToleranceException:
    sources:
      - access: datafabric
        table: ToleranceException
        entityId: dde1dbe6-6c91-44f4-83a5-0d1950350ef7
        folderId: 99267945-982c-4bf6-ae19-ab8764ad8720
        referenceFormulation: rr:SQL2008
    s: ont:ToleranceException/$(exceptionId)
    po:
      - - a
        - ont:ToleranceException
      - - ont:ToleranceException.exceptionId
        - $(exceptionId)
      - - ont:ToleranceException.invoiceId
        - $(invoiceId)
      - - ont:ToleranceException.poId
        - $(poId)
      - - ont:ToleranceException.exceptionType
        - $(exceptionType)
      - - ont:ToleranceException.thresholdPct
        - $(thresholdPct)
      - - ont:ToleranceException.actualPct
        - $(actualPct)
      - - ont:ToleranceException.status
        - $(status)
      - p: ont:exception_onInvoice
        o:
          mapping: Invoice
          condition:
            function: equal
            parameters:
              - - str1
                - $(invoiceId)
              - - str2
                - $(invoiceId)
      - p: ont:exception_againstPO
        o:
          mapping: PurchaseOrder
          condition:
            function: equal
            parameters:
              - - str1
                - $(poId)
              - - str2
                - $(poId)
