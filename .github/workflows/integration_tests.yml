name: Integration testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images in parallel
      run: |
        jobs=(
          "company-research-agent:true"
          "company-research-agent:false"
          "simple-local-mcp:true"
          "simple-local-mcp:false"
          "ticket-classification:true"
          "ticket-classification:false"
          "multi-agent-supervisor-researcher-coder:true"
          "multi-agent-supervisor-researcher-coder:false"
        )

        for job in "${jobs[@]}"; do
          IFS=":" read -r build_dir use_azure_chat <<< "$job"
          log_file="build_${build_dir}_${use_azure_chat}.log"
          (
            echo "Starting build for $build_dir with USE_AZURE_CHAT=$use_azure_chat"
            docker build -f testcases/$build_dir/Dockerfile \
              -t $build_dir:test \
              --build-arg CLIENT_ID="${{ secrets.ALPHA_TEST_CLIENT_ID }}" \
              --build-arg CLIENT_SECRET="${{ secrets.ALPHA_TEST_CLIENT_SECRET }}" \
              --build-arg BASE_URL="${{ secrets.ALPHA_BASE_URL }}" \
              --build-arg USE_AZURE_CHAT="$use_azure_chat" \
              . > "$log_file" 2>&1
            echo "Build for $build_dir with USE_AZURE_CHAT=$use_azure_chat completed"
          ) &
        done

        wait

        echo "All builds completed. Logs:"
        for job in "${jobs[@]}"; do
          IFS=":" read -r build_dir use_azure_chat <<< "$job"
          log_file="build_${build_dir}_${use_azure_chat}.log"
          echo "Logs for $build_dir with USE_AZURE_CHAT=$use_azure_chat:"
          cat "$log_file"
        done