name: Integration testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build common Docker image
      run: |
        echo "Building common Docker image at $(date)"
        docker build -f testcases/Dockerfile \
          -t uipath-langchain-testbase:latest \
          --build-arg USE_AZURE_CHAT="true" \
          .
        echo "Common Docker image built at $(date)"

    - name: Run testcases
      run: |
        jobs=(
          "company-research-agent:true"
          "company-research-agent:false"
          "simple-local-mcp:true"
          "simple-local-mcp:false"
          "ticket-classification:true"
          "ticket-classification:false"
          "multi-agent-supervisor-researcher-coder:true"
          "multi-agent-supervisor-researcher-coder:false"
        )

        echo "=== STARTING TESTCASE EXECUTION ==="
        echo "Total testcases to run: ${#jobs[@]}"
        echo "Testcases with UiPathAzureChatOpenAI: $(echo "${jobs[@]}" | tr ' ' '\n' | grep ':true' | wc -l)"
        echo "Testcases with UiPathChat: $(echo "${jobs[@]}" | tr ' ' '\n' | grep ':false' | wc -l)"
        echo "======================================="

        for job in "${jobs[@]}"; do
          IFS=":" read -r testcase use_azure_chat <<< "$job"
          llm=$([ "$use_azure_chat" = "true" ] && echo "UiPathAzureChatOpenAI" || echo "UiPathChat")
          log_file="run_${testcase}_${llm}.log"
          (
            echo "[$(date)] STARTING: $testcase ($llm)"
            
            # Create log file with header
            {
              echo "========================================"
              echo "TESTCASE: $testcase"
              echo "llm: $llm"
              echo "USE_AZURE_CHAT: $use_azure_chat"
              echo "STARTED_AT: $(date)"
              echo "========================================"
              echo ""
            } > "$log_file"
            
            # Run the testcase and append to log file
            docker run --rm \
              -e CLIENT_ID="${{ secrets.ALPHA_TEST_CLIENT_ID }}" \
              -e CLIENT_SECRET="${{ secrets.ALPHA_TEST_CLIENT_SECRET }}" \
              -e BASE_URL="${{ secrets.ALPHA_BASE_URL }}" \
              -e USE_AZURE_CHAT="$use_azure_chat" \
              uipath-langchain-testbase:latest \
              bash /app/testcases/$testcase/run.sh >> "$log_file" 2>&1
            
            # Add completion status to log file
            if [ $? -eq 0 ]; then
              echo "[$(date)] SUCCESS: $testcase ($llm)"
              {
                echo ""
                echo "========================================"
                echo "COMPLETED_AT: $(date)"
                echo "STATUS: SUCCESS"
                echo "========================================"
              } >> "$log_file"
            else
              echo "[$(date)] FAILED: $testcase ($llm)"
              {
                echo ""
                echo "========================================"
                echo "COMPLETED_AT: $(date)"
                echo "STATUS: FAILED"
                echo "========================================"
              } >> "$log_file"
            fi
          ) &
        done

        wait
        echo "All testcases execution completed."

    - name: Collect testcase outputs
      run: |
        echo "=== COLLECTING TESTCASE OUTPUTS ==="
        
        jobs=(
          "company-research-agent:true"
          "company-research-agent:false"
          "simple-local-mcp:true"
          "simple-local-mcp:false"
          "ticket-classification:true"
          "ticket-classification:false"
          "multi-agent-supervisor-researcher-coder:true"
          "multi-agent-supervisor-researcher-coder:false"
        )
        
        for job in "${jobs[@]}"; do
          IFS=":" read -r testcase use_azure_chat <<< "$job"
          llm=$([ "$use_azure_chat" = "true" ] && echo "UiPathAzureChatOpenAI" || echo "UiPathChat")
          output_file="output_${testcase}_${llm}.json"
          
          echo "Collecting output for $testcase ($llm)..."
          
          # Extract the output from the container
          docker run --rm \
            -e CLIENT_ID="${{ secrets.ALPHA_TEST_CLIENT_ID }}" \
            -e CLIENT_SECRET="${{ secrets.ALPHA_TEST_CLIENT_SECRET }}" \
            -e BASE_URL="${{ secrets.ALPHA_BASE_URL }}" \
            -e USE_AZURE_CHAT="$use_azure_chat" \
            uipath-langchain-testbase:latest \
            bash -c "
              cd /app/testcases/$testcase
              if [ -f __uipath/output.json ]; then
                cat __uipath/output.json
              else
                echo '{\"error\": \"__uipath/output.json not found\"}'
              fi
            " > "$output_file" 2>/dev/null || echo '{"error": "Failed to extract output"}' > "$output_file"
            
          echo "Output saved to $output_file"
        done
        
        echo "=== OUTPUT COLLECTION COMPLETED ==="

    - name: Display company-research-agent (UiPathAzureChatOpenAI) logs
      run: |
        log_file="run_company-research-agent_UiPathAzureChatOpenAI.log"
        output_file="output_company-research-agent_UiPathAzureChatOpenAI.json"
        echo "================================================"
        echo "COMPANY-RESEARCH-AGENT (UiPathAzureChatOpenAI) LOG"
        echo "Log file: $log_file"
        echo "================================================"
        if [ -f "$log_file" ]; then
          cat "$log_file"
        else
          echo "ERROR: Log file not found!"
        fi
        echo ""
        echo "================================================"
        echo "COMPANY-RESEARCH-AGENT (UiPathAzureChatOpenAI) OUTPUT"
        echo "Output file: $output_file"
        echo "================================================"
        if [ -f "$output_file" ]; then
