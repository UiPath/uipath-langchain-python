name: E2E Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - pyproject.toml
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      run_slow_tests:
        description: "Run slow tests (evals)"
        required: false
        default: "false"
        type: boolean

# Permissions required for dorny/test-reporter to create check runs
permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  # Job 1: Validate example configurations (no secrets required)
  # This checks that all example agent.json, eval-sets, and evaluators are valid
  e2e-validation:
    name: Validate Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Validate example configurations
        run: |
          echo "=== Validating example agent.json files and eval configurations ==="
          uv run pytest tests/e2e/ -v -s -m "e2e" -k "test_agent_json or test_eval_sets or test_evaluators" --junitxml=validation-results.xml --tb=short

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-results
          path: validation-results.xml

      - name: Publish validation results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Validation Tests
          path: validation-results.xml
          reporter: java-junit
          fail-on-error: true

  # Job 2: Run e2e tests that require authentication
  # This actually runs the uipath CLI commands against the alpha environment
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    environment: alpha
    needs: e2e-validation  # Only run if validation passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run e2e tests (uipath run command)
        env:
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_URL: ${{ secrets.UIPATH_URL }}
          UIPATH_PROJECT_ID: ${{ secrets.UIPATH_PROJECT_ID }}
        run: |
          echo "=== Running e2e tests for 'uipath run' command ==="
          uv run pytest tests/e2e/test_run.py -v -s -m "e2e" --junitxml=run-results.xml --tb=short

      - name: Run e2e tests (telemetry)
        env:
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_URL: ${{ secrets.UIPATH_URL }}
          UIPATH_PROJECT_ID: ${{ secrets.UIPATH_PROJECT_ID }}
          TELEMETRY_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          APPLICATIONINSIGHTS_API_KEY: ${{ secrets.APPLICATIONINSIGHTS_API_KEY }}
        run: |
          echo "=== Running e2e tests for telemetry functionality ==="
          uv run pytest tests/e2e/test_telemetry.py -v -s -m "e2e" --junitxml=telemetry-results.xml --tb=short

      - name: Run e2e tests (uipath eval command)
        env:
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_URL: ${{ secrets.UIPATH_URL }}
          UIPATH_PROJECT_ID: ${{ secrets.UIPATH_PROJECT_ID }}
        run: |
          echo "=== Running e2e tests for 'uipath eval' command ==="
          uv run pytest tests/e2e/test_eval.py -v -s -m "e2e" --junitxml=eval-results.xml --tb=short

      - name: Post evaluation results to PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create the comment body
          if [ -f eval-summary.md ]; then
            EVAL_CONTENT=$(cat eval-summary.md)
          else
            EVAL_CONTENT="No evaluation results available."
          fi

          # Build the full comment with header and footer
          COMMENT_BODY=$(cat <<EOF
          ## 🤖 E2E Test Results

          $EVAL_CONTENT

          ---
          <sub>📊 Generated by E2E workflow | [View full run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
          EOF
          )

          # Find and update existing comment or create new one
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | contains("## 🤖 E2E Test Results")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            # Update existing comment
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              -X PATCH \
              -f body="$COMMENT_BODY"
            echo "Updated existing comment $COMMENT_ID"
          else
            # Create new comment
            gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT_BODY"
            echo "Created new comment"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            run-results.xml
            eval-results.xml
          if-no-files-found: ignore

      - name: Publish run test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Run Tests
          path: run-results.xml
          reporter: java-junit
          fail-on-error: true

      - name: Publish eval test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Eval Tests
          path: eval-results.xml
          reporter: java-junit
          fail-on-error: true
