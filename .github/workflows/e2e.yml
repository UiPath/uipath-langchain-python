name: E2E Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - pyproject.toml
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      run_slow_tests:
        description: "Run slow tests (evals)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  # Job 1: Discover tests dynamically
  discover-tests:
    name: Discover Tests
    runs-on: ubuntu-latest
    outputs:
      run-tests: ${{ steps.discover-run.outputs.tests }}
      telemetry-tests: ${{ steps.discover-telemetry.outputs.tests }}
      eval-tests: ${{ steps.discover-eval.outputs.tests }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Discover run tests
        id: discover-run
        run: |
          TESTS=$(uv run pytest tests/e2e/test_run.py::TestUiPathRun --collect-only -q 2>&1 | grep '<Function' | sed 's/.*<Function //' | sed 's/>//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$TESTS" >> $GITHUB_OUTPUT
          echo "Discovered run tests: $TESTS"

      - name: Discover telemetry tests
        id: discover-telemetry
        run: |
          TESTS=$(uv run pytest tests/e2e/test_telemetry.py::TestTelemetryE2E --collect-only -q 2>&1 | grep '<Function' | sed 's/.*<Function //' | sed 's/>//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$TESTS" >> $GITHUB_OUTPUT
          echo "Discovered telemetry tests: $TESTS"

      - name: Discover eval tests
        id: discover-eval
        run: |
          TESTS=$(uv run pytest tests/e2e/test_eval.py::TestEvalExecution --collect-only -q 2>&1 | grep '<Function' | sed 's/.*<Function //' | sed 's/>//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$TESTS" >> $GITHUB_OUTPUT
          echo "Discovered eval tests: $TESTS"

  # Job 2: Validate example configurations (no secrets required)
  e2e-validation:
    name: Validate Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Validate example configurations
        run: |
          echo "=== Validating example agent.json files and eval configurations ==="
          uv run pytest tests/e2e/ -v -s -m "e2e" -k "test_agent_json or test_eval_sets or test_evaluators" --junitxml=validation-results.xml --tb=short

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-results
          path: validation-results.xml

      - name: Publish validation results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Validation Tests
          path: validation-results.xml
          reporter: java-junit
          fail-on-error: true

  # Job 3: Run e2e run tests (matrix)
  e2e-run-tests:
    name: "Run: ${{ matrix.test }}"
    runs-on: ubuntu-latest
    needs: [discover-tests, e2e-validation]
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover-tests.outputs.run-tests) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run test
        env:
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_URL: ${{ secrets.UIPATH_URL }}
          UIPATH_PROJECT_ID: ${{ secrets.UIPATH_PROJECT_ID }}
        run: |
          echo "=== Running ${{ matrix.test }} ==="
          uv run pytest tests/e2e/test_run.py::TestUiPathRun::${{ matrix.test }} -v -s -m "e2e" --junitxml=${{ matrix.test }}-results.xml --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-${{ matrix.test }}-results
          path: ${{ matrix.test }}-results.xml

  # Job 4: Run e2e telemetry tests (matrix)
  e2e-telemetry-tests:
    name: "Telemetry: ${{ matrix.test }}"
    runs-on: ubuntu-latest
    needs: [discover-tests, e2e-validation]
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover-tests.outputs.telemetry-tests) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run test
        env:
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_URL: ${{ secrets.UIPATH_URL }}
          UIPATH_PROJECT_ID: ${{ secrets.UIPATH_PROJECT_ID }}
          TELEMETRY_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          APPLICATIONINSIGHTS_API_KEY: ${{ secrets.APPLICATIONINSIGHTS_API_KEY }}
        run: |
          echo "=== Running ${{ matrix.test }} ==="
          uv run pytest tests/e2e/test_telemetry.py::TestTelemetryE2E::${{ matrix.test }} -v -s -m "e2e" --junitxml=${{ matrix.test }}-results.xml --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: telemetry-${{ matrix.test }}-results
          path: ${{ matrix.test }}-results.xml

  # Job 5: Run e2e eval tests (matrix)
  e2e-eval-tests:
    name: "Eval: ${{ matrix.test }}"
    runs-on: ubuntu-latest
    needs: [discover-tests, e2e-validation]
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover-tests.outputs.eval-tests) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run test
        env:
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_URL: ${{ secrets.UIPATH_URL }}
          UIPATH_PROJECT_ID: ${{ secrets.UIPATH_PROJECT_ID }}
        run: |
          echo "=== Running ${{ matrix.test }} ==="
          uv run pytest tests/e2e/test_eval.py::TestEvalExecution::${{ matrix.test }} -v -s -m "e2e" --junitxml=${{ matrix.test }}-results.xml --tb=short

      - name: Upload eval summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-summary-${{ matrix.test }}
          path: eval-summary.md
          if-no-files-found: ignore

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-${{ matrix.test }}-results
          path: ${{ matrix.test }}-results.xml

  # Job 6: Run integration trace tests
  integration-trace-tests:
    name: "Integration: Trace Assertions"
    runs-on: ubuntu-latest
    needs: [e2e-validation]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run integration trace tests
        env:
          UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
          UIPATH_URL: ${{ secrets.UIPATH_URL }}
          UIPATH_ORGANIZATION_ID: ${{ secrets.UIPATH_ORGANIZATION_ID }}
          UIPATH_TENANT_ID: ${{ secrets.UIPATH_TENANT_ID }}
          UIPATH_FOLDER_KEY: ${{ secrets.UIPATH_FOLDER_KEY }}
        run: |
          echo "=== Running integration trace tests ==="
          uv run pytest tests/integration/ -v -s --junitxml=integration-trace-results.xml --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-trace-results
          path: integration-trace-results.xml

  # Job 7: Aggregate and publish all test results
  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [e2e-validation, e2e-run-tests, e2e-telemetry-tests, e2e-eval-tests, integration-trace-tests]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
          pattern: "*-results"

      - name: Publish aggregated run test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Run Tests
          path: "test-results/run-*-results/*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Publish aggregated telemetry test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Telemetry Tests
          path: "test-results/telemetry-*-results/*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Publish aggregated eval test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Eval Tests
          path: "test-results/eval-*-results/*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Publish integration trace test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Trace Tests
          path: "test-results/integration-trace-results/*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Download eval summaries
        uses: actions/download-artifact@v4
        if: always() && github.event_name == 'pull_request'
        with:
          path: eval-summaries
          pattern: eval-summary-*

      - name: Generate test summary and post to PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Generate test summary from JUnit XML results
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import glob
          import os

          suites = [
              ("Validation", "test-results/validation-results/*.xml"),
              ("Run Tests", "test-results/run-*-results/*.xml"),
              ("Telemetry Tests", "test-results/telemetry-*-results/*.xml"),
              ("Eval Tests", "test-results/eval-*-results/*.xml"),
              ("Integration Trace Tests", "test-results/integration-trace-results/*.xml"),
          ]

          lines = []
          lines.append("### Test Suite Summary\n")
          lines.append("| Suite | Tests | Passed | Failed | Skipped | Status |")
          lines.append("|-------|------:|-------:|-------:|--------:|--------|")

          total_tests = 0
          total_passed = 0
          total_failed = 0
          total_skipped = 0

          # (label, test_name, status_icon, detail) per test case
          all_cases: list[tuple[str, str, str, str]] = []

          for label, pattern in suites:
              files = glob.glob(pattern)
              if not files:
                  lines.append(f"| {label} | - | - | - | - | No results |")
                  continue

              tests = 0
              failures = 0
              errors = 0
              skipped = 0

              for f in files:
                  try:
                      tree = ET.parse(f)
                      root = tree.getroot()
                      for ts in (root.findall("testsuite") if root.tag == "testsuites" else [root]):
                          tests += int(ts.get("tests", 0))
                          failures += int(ts.get("failures", 0))
                          errors += int(ts.get("errors", 0))
                          skipped += int(ts.get("skipped", 0))

                          for tc in ts.findall("testcase"):
                              name = tc.get("name", "unknown")
                              failure = tc.find("failure")
                              error = tc.find("error")
                              skip = tc.find("skipped")
                              if failure is not None or error is not None:
                                  msg = (failure if failure is not None else error).get("message", "")
                                  all_cases.append((label, name, "Failed", msg[:120]))
                              elif skip is not None:
                                  reason = skip.get("message", "")
                                  all_cases.append((label, name, "Skipped", reason[:120]))
                              else:
                                  duration = tc.get("time", "")
                                  detail = f"{float(duration):.1f}s" if duration else ""
                                  all_cases.append((label, name, "Passed", detail))
                  except Exception as e:
                      print(f"Warning: Could not parse {f}: {e}")

              failed = failures + errors
              passed = tests - failed - skipped
              status = "Pass" if failed == 0 else "Fail"

              total_tests += tests
              total_passed += passed
              total_failed += failed
              total_skipped += skipped

              lines.append(f"| {label} | {tests} | {passed} | {failed} | {skipped} | {status} |")

          total_status = "Pass" if total_failed == 0 else "Fail"
          lines.append(f"| **Total** | **{total_tests}** | **{total_passed}** | **{total_failed}** | **{total_skipped}** | **{total_status}** |")
          lines.append("")

          # Per-suite breakdown with individual test cases
          current_suite = None
          for suite, name, status, detail in all_cases:
              if suite != current_suite:
                  if current_suite is not None:
                      lines.append("\n</details>\n")
                  suite_cases = [c for c in all_cases if c[0] == suite]
                  suite_failed = sum(1 for c in suite_cases if c[2] == "Failed")
                  icon = "Pass" if suite_failed == 0 else "Fail"
                  lines.append(f"<details>")
                  lines.append(f"<summary><b>{suite}</b> — {icon}</summary>\n")
                  lines.append("| Test | Status | Detail |")
                  lines.append("|------|--------|--------|")
                  current_suite = suite
              lines.append(f"| {name} | {status} | {detail} |")
          if current_suite is not None:
              lines.append("\n</details>\n")

          with open("test-summary.md", "w") as f:
              f.write("\n".join(lines))
          PYEOF

          # Combine eval summaries
          EVAL_SUMMARY=""
          for dir in eval-summaries/eval-summary-*/; do
            if [ -f "${dir}eval-summary.md" ]; then
              EVAL_SUMMARY="${EVAL_SUMMARY}$(cat "${dir}eval-summary.md")"$'\n'
            fi
          done

          TEST_SUMMARY=$(cat test-summary.md)

          # Build the full comment
          COMMENT_BODY=$(cat <<EOF
          ## 🤖 E2E Test Results

          ${TEST_SUMMARY}

          EOF
          )

          if [ -n "$EVAL_SUMMARY" ]; then
            COMMENT_BODY=$(cat <<EOF
          ${COMMENT_BODY}
          ### Evaluation Details

          ${EVAL_SUMMARY}

          EOF
            )
          fi

          COMMENT_BODY=$(cat <<EOF
          ${COMMENT_BODY}
          ---
          <sub>Generated by E2E workflow | [View full run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
          EOF
          )

          # Find and update existing comment or create new one
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | contains("## 🤖 E2E Test Results")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              -X PATCH \
              -f body="$COMMENT_BODY"
            echo "Updated existing comment $COMMENT_ID"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT_BODY"
            echo "Created new comment"
          fi
