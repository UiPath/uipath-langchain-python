[project]
name = "dev-console-test"
version = "0.0.1"
description = "Test case for uipath dev TUI console functionality"
authors = [{ name = "UiPath", email = "test@uipath.com" }]
dependencies = [
    "langgraph>=0.2.70",
    "langchain-core>=0.3.34",
    "python-dotenv>=1.0.1",
    "uipath-langchain",
    "uipath-dev==0.0.84.dev1001120288",
    "pydantic>=2.10.6",
    "typing-extensions>=4.12.2",
    "pexpect>=4.9.0",
    "pyte>=0.8.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]
requires-python = ">=3.11"

[tool.uv.sources]
uipath-langchain = { path = "../../", editable = true }
uipath-dev = { index = "testpypi" }

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true

[tool.uv]
override-dependencies = [
    "uipath>=2.13.0,<2.14.0",
    "uipath-runtime>=0.12.1,<0.13.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
