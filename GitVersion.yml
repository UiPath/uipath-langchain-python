workflow: TrunkBased/preview1 # this gives the auto patch increment for `main` branch on each commit
branches:
  any: # by default only `feature(s)/{BranchName}` branches are targeted, so custom item is required to target all branches (feat, fix, chore etc)
    mode: ContinuousDelivery
    label: a
    # increment: Minor
    increment: Inherit
    prevent-increment:
      when-current-commit-tagged: false
    track-merge-message: true
    regex: ^.+[\/-](?<BranchName>.+)
    source-branches:
      - main
    is-source-branch-for: []
    is-main-branch: false
    pre-release-weight: 30000
  pull-request:
    mode: ContinuousDelivery
    label: pre{Number}
    increment: Inherit
    prevent-increment:
      of-merged-branch: true
      when-current-commit-tagged: false
    track-merge-message: true
    regex: ^pull\/(?<Number>\d+)\/merge$
    source-branches:
      - main
    is-source-branch-for: []
    pre-release-weight: 30000
